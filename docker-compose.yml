services:
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    env_file: .env
    environment:
      WORKER_PUBLIC_URL: http://worker:3002
    ports:
      - "3001:3001"

  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
    env_file: .env
    environment:
      WORKER_PORT: 3002
    ports:
      - "3002:3002"

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    env_file: .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:3001/api/v1
    depends_on:
      - api
    ports:
      - "3000:3000"
